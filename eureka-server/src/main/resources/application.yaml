server:
  port: 8761

spring:
  application:
    name: eureka-server

eureka:
  client:
    register-with-eureka: false
    fetch-registry: false
  server:
    wait-time-in-ms-when-sync-empty: 0

---
spring:
  config:
    activate:
      on-profile: dev
eureka:
  instance:
    hostname: localhost

---
spring:
  config:
    activate:
      on-profile: docker
eureka:
  instance:
    hostname: eureka-server